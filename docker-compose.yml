version: "3.8"

services:
  family-organizer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: family_organizer_app
    restart: unless-stopped
    ports:
      # host 3001 -> container 3000 (cổng 3000 trên host đã bị container "homepage" dùng)
      - "3001:3000"
    volumes:
      # Persistent storage on Raspberry Pi 5.
      # DB file to store tasks, finances, notes and daily backups.
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
