services:
  family-organizer:
    # Pull the published image from GHCR so Watchtower can auto-update it.
    # CI (.github/workflows/docker-publish.yml) builds & pushes this on every push to main.
    # `build:` is kept so you can still build locally with `docker compose up -d --build`.
    image: ghcr.io/happysmartlight/family-organizer:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: family_organizer_app
    restart: unless-stopped
    ports:
      # Bind only to loopback + LAN IP (NOT 0.0.0.0) so the Tailscale interface
      # stays free for `tailscale serve` to expose HTTPS on the same port 3001.
      # This matches the rest of the homelab (immich/homepage/etc).
      - "127.0.0.1:3001:3000"
      - "192.168.1.2:3001:3000"
    volumes:
      # Persistent storage on Raspberry Pi 5.
      # DB file + uploaded images (avatars/assets/receipts) + daily backups.
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      # Compose auto-reads ./.env for ${VAR} substitution; ":-" => empty if missing
      # (gitignored, never baked into the image). Used by the AI assistant.
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - APP_URL=${APP_URL:-}
      # Self-update: the app's "Cập nhật ngay" button calls Watchtower's HTTP API.
      - WATCHTOWER_URL=http://watchtower:8080
      - WATCHTOWER_HTTP_API_TOKEN=${WATCHTOWER_HTTP_API_TOKEN:-}
      - GITHUB_REPO=${GITHUB_REPO:-happysmartlight/Family-Organizer}
    labels:
      # Let Watchtower manage (auto-update) this container.
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      # Needs the Docker socket to pull images and recreate containers.
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true            # remove old images after update
      - WATCHTOWER_LABEL_ENABLE=true       # only watch containers labelled above
      - WATCHTOWER_POLL_INTERVAL=86400     # also auto-check once a day
      - WATCHTOWER_HTTP_API_UPDATE=true    # enable the on-demand /v1/update endpoint
      - WATCHTOWER_HTTP_API_PERIODIC_POLLS=true
      - WATCHTOWER_HTTP_API_TOKEN=${WATCHTOWER_HTTP_API_TOKEN:-}
    ports:
      # Exposed only on loopback; the app reaches it in-network via http://watchtower:8080.
      - "127.0.0.1:8080:8080"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
