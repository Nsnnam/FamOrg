services:
  family-organizer:
    # Prebuilt image (avoid local Alpine build on NAS). Override via IMAGE=...
    image: ${IMAGE:-ghcr.io/happysmartlight/family-organizer:latest}
    build:
      context: .
      dockerfile: Dockerfile
      network: host
      args:
        GIT_SHA: ${GIT_SHA:-}
        APP_VERSION: ${APP_VERSION:-}
        BUILD_TIME: ${BUILD_TIME:-}
    container_name: family_organizer_app
    restart: unless-stopped
    # No host ports — nginx terminates LAN HTTP + public HTTPS
    expose:
      - "3000"
    volumes:
      - ./data:/app/data
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      - NODE_ENV=production
      - PORT=3000
      - TZ=Asia/Ho_Chi_Minh
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - APP_URL=${APP_URL:-https://namns.i234.me:8561}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
      - VAPID_SUBJECT=${VAPID_SUBJECT:-}
      - WATCHTOWER_URL=http://watchtower:8080
      - WATCHTOWER_HTTP_API_TOKEN=${WATCHTOWER_HTTP_API_TOKEN:-}
      - GITHUB_REPO=${GITHUB_REPO:-Nsnnam/FamOrg}
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Same pattern as /volume5/docker/thuchi: HTTP LAN + HTTPS public
  nginx:
    image: nginx:1.27-alpine
    container_name: famorg_nginx
    restart: unless-stopped
    depends_on:
      - family-organizer
    ports:
      # Local HTTP (LAN)
      - "${LOCAL_PORT:-3576}:80"
      # Public HTTPS
      - "${PUBLIC_PORT:-8561}:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/certs:ro
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_POLL_INTERVAL=86400
      - WATCHTOWER_HTTP_API_UPDATE=true
      - WATCHTOWER_HTTP_API_PERIODIC_POLLS=true
      - WATCHTOWER_HTTP_API_TOKEN=${WATCHTOWER_HTTP_API_TOKEN:-}
      - DOCKER_API_VERSION=1.40
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
