<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <!-- Apply saved theme before first paint to avoid a light-mode flash (FOUC) for dark users -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("family_theme") || "light";
          if (t === "dark") document.documentElement.classList.add("dark");
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute("content", t === "dark" ? "#0d121f" : "#f8fafc");
        } catch (e) {}
      })();
    </script>
    <meta name="description" content="Family Organizer Hub" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/pwa-icon.svg" />
    <!-- iOS / Apple PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Family Hub" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/pwa-icon.svg" />
    <title>Family Organizer</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
